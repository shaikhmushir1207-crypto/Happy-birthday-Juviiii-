<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Juviii ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#240046,#5a189a,#f72585);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    color:#fff;
}

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    max-width:360px;
    width:90%;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

input{
    width:45px;
    height:50px;
    margin:5px;
    text-align:center;
    font-size:22px;
    border:none;
    border-radius:10px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4da6;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ff2e93;
}

#birthday{
    display:none;
}

.heart{
    position:fixed;
    color:#ff9ad5;
    font-size:24px;
    animation:float 5s linear forwards;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<div class="card" id="lock">

<h1>🎁 For Juviii ❤️</h1>

<p>Enter the Secret Passcode</p>

<div>
<input id="a" maxlength="1">
<input id="b" maxlength="1">
<input id="c" maxlength="1">
<input id="d" maxlength="1">
</div>

<button onclick="unlock()">Unlock 🎀</button>

</div>

<div class="card" id="birthday">

<h1>🎉 Happy Birthday Juviii ❤️</h1>

<h2>🎂</h2>

<p>
Wishing you a day filled with happiness,
love, laughter and unforgettable memories.
May all your dreams come true.
Have an amazing birthday! 💖
</p>

</div>

<script>

function unlock(){

let pass=
document.getElementById("a").value+
document.getElementById("b").value+
document.getElementById("c").value+
document.getElementById("d").value;

if(pass==="1207"){

document.getElementById("lock").style.display="none";

document.getElementById("birthday").style.display="block";

setInterval(createHeart,250);

}else{

alert("Wrong Passcode ❤️");

}

}

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(function(){

heart.remove();

},5000);

}

const inputs=document.querySelectorAll("input");

inputs.forEach((input,index)=>{

input.addEventListener("input",function(){

if(this.value.length===1 && index<inputs.length-1){

inputs[index+1].focus();

}

});

});

</script>

</body>
</html>
